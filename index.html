<!DOCTYPE html>
<html>
<head>
    <title>志愿者须知</title>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { color: #333; }
        p { font-size: 18px; line-height: 1.6; }
    </style>
	<style>
    .formatted-text {
      width: 300px; /* 可选：设置容器宽度 */
      border: 1px solid #ccc; /* 仅用于演示边界 */
      padding: 10px;
      
      /* 自动换行核心样式 */

<body>
    <h1>科研采样，自愿参加！</h1>
    <p>关于 "样本采集流程"</p>
	<div class="formatted-text">
	  采集样本前，在信封表面写明个人信息。采样棉签两根均采集，先取出一只棉签，使用尖头端贴于口腔一侧牙床至面颊内侧部位，稍用力擦拭口腔黏膜半分钟左右。取出另一只棉签，同样的方法擦拭另一侧口腔黏膜，然后将棉签采集端朝下放入信封中。
	</div>
    <p>关于 "个人信息"</p>

	  本研究及志愿者的个人资料均属保密，不会泄露。
	</div>

	  我们将支付每位志愿者50元的样本费。
	</div>
